name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop deps
        run: npm install --include=dev
        working-directory: apps/desktop

      - name: Create .env
        working-directory: apps/desktop
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build Mac
        working-directory: apps/desktop
        run: npx electron-builder --mac --arm64 --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: apps/desktop/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop deps
        run: npm install
        working-directory: apps/desktop

      - name: Create .env
        working-directory: apps/desktop
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build Windows
        working-directory: apps/desktop
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: apps/desktop/dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac builds
        uses: actions/download-artifact@v4
        with:
          name: mac-builds
          path: dist/

      - name: Download Windows builds
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          name: "Portia ${{ github.ref_name }}"
          body: |
            ## Portia ${{ github.ref_name }}

            ### Descargas
            - **Mac (Apple Silicon):** `Portia-*-arm64.dmg`
            - **Mac (Intel):** `Portia-*-x64.dmg`
            - **Windows:** `Portia-Setup-*.exe`

            ### Instalación
            **Mac:** Abre el `.dmg` y arrastra Portia a Aplicaciones.
            **Windows:** Ejecuta el `.exe` como administrador.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
