name: Release

on:
  push:
    tags:
      - 'v*'

# Mínimo privilegio a nivel de workflow: solo lectura. El permiso de escritura
# (necesario para crear la Release) se otorga únicamente en el job `release`.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm test

  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install desktop deps
        run: npm install --include=dev
        working-directory: apps/desktop

      - name: Check binary exists
        run: ls -la apps/desktop/node_modules/app-builder-bin/mac/ || echo "Binary not found"

      - name: Create .env
        working-directory: apps/desktop
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build Mac
        working-directory: apps/desktop
        run: npx electron-builder --mac --arm64 --x64 --publish never

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mac-builds
          path: apps/desktop/dist/*.dmg

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install desktop deps
        run: npm install --include=dev
        working-directory: apps/desktop

      - name: Check binary exists
        run: dir apps\desktop\node_modules\app-builder-bin\win\x64\ 2>NUL || echo "Binary not found"

      - name: Create .env
        working-directory: apps/desktop
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build Windows
        working-directory: apps/desktop
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-builds
          path: apps/desktop/dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Mac builds
        uses: actions/download-artifact@v8
        with:
          name: mac-builds
          path: dist/

      - name: Download Windows builds
        uses: actions/download-artifact@v8
        with:
          name: windows-builds
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          name: "Portia ${{ github.ref_name }}"
          body: |
            ## Portia ${{ github.ref_name }}

            ### Descargas
            - **Mac (Apple Silicon):** `Portia-*-arm64.dmg`
            - **Mac (Intel):** `Portia-*-x64.dmg`
            - **Windows:** `Portia-Setup-*.exe`

            ### Instalación
            **Mac:** Abre el `.dmg` y arrastra Portia a Aplicaciones.
            **Windows:** Ejecuta el `.exe` como administrador.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
